<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotobox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="screen" id="screen-start">
    <div class="logo">📸</div>
    <h1>FOTOBOX</h1>
    <p class="subtitle">Berühren zum Starten</p>
    <button class="btn-start" onclick="startSession()">START</button>
  </div>

  <div class="screen hidden" id="screen-countdown">
    <div class="countdown" id="countdown">3</div>
    <p>Bereit machen!</p>
  </div>

  <div class="screen hidden" id="screen-photo">
    <div class="flash" id="flash"></div>
    <p class="big-text">📷 CHEESE!</p>
  </div>

  <div class="screen hidden" id="screen-done">
    <div class="logo">✅</div>
    <h2>Danke!</h2>
    <p>Dein Foto wird gedruckt.</p>
    <button class="btn-start" onclick="reset()">Nochmal</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
