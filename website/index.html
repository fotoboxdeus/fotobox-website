<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotobox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Video Layer -->
  <div class="layer" id="layer-video">
    <video id="bg-video" autoplay muted loop playsinline>
      <source src="video/loop.mp4" type="video/mp4">
    </video>
    <!-- Fallback wenn noch kein Video vorhanden -->
    <div class="video-fallback" id="video-fallback">
      <div class="fallback-icon">📸</div>
      <h1>FOTOBOX</h1>
      <p>video/loop.mp4 ablegen</p>
    </div>
  </div>

  <!-- Galerie Layer -->
  <div class="layer" id="layer-gallery">
    <iframe id="gallery-frame" src="about:blank" frameborder="0" allowfullscreen></iframe>
  </div>

  <script src="app.js"></script>
</body>
</html>
